<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>カート詳細 - Cytech EC</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/cart.css}">
</head>
<body>

<header>
    <a class="logo" th:href="@{/top}">Cytech EC.</a>
    <form th:action="@{/products}" method="get">
        <input type="text" name="keyword" placeholder="商品名">
        <select name="categoryId">
            <option value="">全カテゴリー</option>
            <option th:each="category : ${categories}"
                    th:value="${category.categoryId}"
                    th:text="${category.categoryName}">
            </option>
        </select>
        <button type="submit">検索</button>
    </form>
    <div class="user-info">
        <a class="mypage-btn" th:href="@{/mypage}">マイページ</a>
        <span sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post" style="display:inline;"><button type="submit" class="logout-btn">ログアウト</button></form>
    </div>
</header>

<main>
    <h2>カート詳細</h2>
    <div class="cart-container">

        <div th:if="${#lists.isEmpty(carts)}" class="cart-empty">
            <p>カートに商品がありません</p>
            <a th:href="@{/products}" class="btn btn-primary">商品一覧へ</a>
        </div>

        <div th:each="cart : ${carts}" th:with="product=${productMap[cart.cartId]}">
            <div class="cart-item">
                <img th:src="@{/images/} + ${product?.imgPath}" alt="商品画像"
                     onerror="this.src='https://placehold.co/450x300'">
                <div class="cart-item-info">
                    <p class="cart-item-name" th:text="${product?.productName}"></p>
                    <p>個数：
                        <select class="quantity-select"
                                th:data-cart-id="${cart.cartId}"
                                th:data-price="${product?.price}"
                                th:data-tax-price="${product?.taxPrice}">
                            <option th:each="i : ${#numbers.sequence(1, 10)}"
                                    th:value="${i}"
                                    th:text="${i}"
                                    th:selected="${i == cart.quantity}">
                            </option>
                        </select>
                    </p>
                    <p>価格：<span th:text="'¥' + ${product?.price}"></span></p>
                    <p>税込価格：<span th:text="'¥' + ${product?.taxPrice}"></span></p>
                    <p>小計（税抜）：<span th:id="'item-total-' + ${cart.cartId}"
                                  th:text="'¥' + ${product?.price * cart.quantity}"></span></p>
                    <p>小計（税込）：<span th:id="'item-tax-total-' + ${cart.cartId}"
                                  th:text="'¥' + ${product?.taxPrice * cart.quantity}"></span></p>
                </div>
                <form th:action="@{/cart/delete}" method="post">
                    <input type="hidden" name="cartId" th:value="${cart.cartId}">
                    <button type="submit" class="btn btn-danger">削除</button>
                </form>
            </div>
        </div>

        <div class="cart-summary" th:unless="${#lists.isEmpty(carts)}">
            <p>合計（税抜）：<span th:text="'¥' + ${total}"></span></p>
            <p>合計（税込）：<span th:text="'¥' + ${totalTax}"></span></p>
        </div>

        <div class="cart-actions" th:unless="${#lists.isEmpty(carts)}">
            <a th:href="@{/top}" class="btn btn-secondary">TOP画面に戻る</a>
            <a th:href="@{/order}" class="btn btn-primary">レジに進む</a>
        </div>
    </div>
</main>

<footer>
    <p>©Cytech EC.com</p>
</footer>

<script th:src="@{/js/cart.js}"></script>
</body>
</html>

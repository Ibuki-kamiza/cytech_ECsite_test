<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>購入詳細 - Cytech EC</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/order.css}">
</head>
<body>

<header>
    <a class="logo" th:href="@{/top}">Cytech EC.</a>
    <form th:action="@{/products}" method="get">
        <input type="text" name="keyword" placeholder="商品名">
        <select name="categoryId">
            <option value="">全カテゴリー</option>
            <option th:each="category : ${categories}"
                    th:value="${category.categoryId}"
                    th:text="${category.categoryName}">
            </option>
        </select>
        <button type="submit">検索</button>
    </form>
    <div class="user-info">
        <a class="mypage-btn" th:href="@{/mypage}">マイページ</a>
        <span sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post" style="display:inline;"><button type="submit" class="logout-btn">ログアウト</button></form>
    </div>
</header>

<main>
    <div class="order-container">
        <h2>購入詳細画面</h2>
        <form th:action="@{/order/confirm}" method="post" th:object="${order}">
            <input type="hidden" th:field="*{totalPrice}">

            <h3>受け取り場所</h3>
            <label>名前</label>
            <input type="text" th:field="*{name}" placeholder="名前">
            <label>住所</label>
            <input type="text" th:field="*{address}" placeholder="住所">
            <label>アパート名等</label>
            <input type="text" th:field="*{apartment}" placeholder="アパート名等">

            <h3>お支払い情報</h3>
            <label>カード番号</label>
            <input type="text" th:field="*{cardNumber}" placeholder="カード番号">
            <label>有効期限</label>
            <input type="text" th:field="*{cardExpire}" placeholder="DD/YY">

            <div class="order-total">
                <p>合計金額（税込）：<span th:text="'¥' + ${totalTax}"></span></p>
            </div>

            <button type="submit" class="btn btn-primary btn-full">確認</button>
        </form>
    </div>
</main>

<footer>
    <p>©Cytech EC.com</p>
</footer>

</body>
</html>
